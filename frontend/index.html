<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduTestify Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .question { margin-bottom: 15px; }
        .options input { margin-right: 5px; }
        #submitQuiz { padding: 8px 15px; font-size: 16px; }
        #result { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Sample Quiz</h1>

    <div class="question" id="q1">
        <p>1. What is 2 + 2?</p>
        <div class="options">
            <label><input type="radio" name="q1" value="3"> 3</label><br>
            <label><input type="radio" name="q1" value="4"> 4</label><br>
            <label><input type="radio" name="q1" value="5"> 5</label>
        </div>
    </div>

    <div class="question" id="q2">
        <p>2. What is the capital of India?</p>
        <div class="options">
            <label><input type="radio" name="q2" value="Delhi"> Delhi</label><br>
            <label><input type="radio" name="q2" value="Mumbai"> Mumbai</label><br>
            <label><input type="radio" name="q2" value="Kolkata"> Kolkata</label>
        </div>
    </div>

    <button id="submitQuiz">Submit Quiz</button>

    <div id="result"></div>

    <script>
        const submitButton = document.getElementById('submitQuiz');
        const resultDiv = document.getElementById('result');

        submitButton.addEventListener('click', () => {
            let score = 0;

            // Check answers
            const q1 = document.querySelector('input[name="q1"]:checked');
            if (q1 && q1.value === "4") score++;

            const q2 = document.querySelector('input[name="q2"]:checked');
            if (q2 && q2.value === "Delhi") score++;

            resultDiv.textContent = `You scored ${score} out of 2`;
        });
    </script>
</body>
</html>
